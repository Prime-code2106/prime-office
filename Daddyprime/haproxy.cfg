# HAProxy Configuration for Ejabberd Load Balancing
# Optimized for 10K+ concurrent users

global
    daemon
    maxconn 50000
    log stdout local0
    
    # Performance tuning
    tune.ssl.default-dh-param 2048
    tune.bufsize 32768
    tune.maxrewrite 8192
    
    # SSL/TLS configuration
    ssl-default-bind-ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    option httplog
    option dontlognull
    option redispatch
    retries 3
    maxconn 10000
    
    # Health check configuration
    option httpchk GET /health
    http-check expect status 200

# Statistics interface
stats enable
stats uri /haproxy-stats
stats refresh 30s
stats admin if TRUE

#########################
### FRONTEND CONFIGS ####
#########################

# HTTP/HTTPS Frontend (Web Interface)
frontend web_frontend
    bind *:80
    bind *:443 ssl crt /etc/ssl/certs/daddy.pem
    
    # Redirect HTTP to HTTPS
    redirect scheme https if !{ ssl_fc }
    
    # Route to appropriate backend
    acl is_websocket hdr(Upgrade) -i websocket
    acl is_api path_beg /api
    acl is_upload path_beg /upload
    acl is_admin path_beg /admin
    
    use_backend ejabberd_websocket if is_websocket
    use_backend ejabberd_api if is_api
    use_backend ejabberd_upload if is_upload
    use_backend ejabberd_admin if is_admin
    default_backend ejabberd_web

# XMPP Client Frontend (Port 5222)
frontend xmpp_client_frontend
    bind *:5222
    mode tcp
    option tcplog
    default_backend ejabberd_xmpp_client

# XMPP Server Frontend (Port 5269)
frontend xmpp_server_frontend
    bind *:5269
    mode tcp
    option tcplog
    default_backend ejabberd_xmpp_server

# WebSocket Frontend (Port 5443)
frontend websocket_frontend
    bind *:5443 ssl crt /etc/ssl/certs/daddy.pem
    mode http
    option httplog
    
    # WebSocket upgrade handling
    acl is_websocket hdr(Upgrade) -i websocket
    acl is_websocket_connection hdr(Connection) -i upgrade
    
    use_backend ejabberd_websocket if is_websocket is_websocket_connection
    default_backend ejabberd_web

#########################
### BACKEND CONFIGS #####
#########################

# Ejabberd Web Backend
backend ejabberd_web
    mode http
    balance roundrobin
    option httpchk GET /
    
    # Health check and load balancing
    server ejabberd1 ejabberd1:5280 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd2 ejabberd2:5280 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd3 ejabberd3:5280 check inter 2000ms rise 2 fall 3 weight 100

# WebSocket Backend (Sticky Sessions)
backend ejabberd_websocket
    mode http
    balance source  # Sticky sessions for WebSocket
    option httpchk GET /ws
    
    # WebSocket specific settings
    timeout tunnel 3600s
    timeout server 3600s
    
    server ejabberd1 ejabberd1:5443 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd2 ejabberd2:5443 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd3 ejabberd3:5443 check inter 2000ms rise 2 fall 3 weight 100

# XMPP Client Backend (TCP)
backend ejabberd_xmpp_client
    mode tcp
    balance leastconn  # Best for persistent connections
    option tcp-check
    
    # TCP health check
    tcp-check connect port 5222
    
    server ejabberd1 ejabberd1:5222 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd2 ejabberd2:5222 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd3 ejabberd3:5222 check inter 2000ms rise 2 fall 3 weight 100

# XMPP Server Backend (S2S)
backend ejabberd_xmpp_server
    mode tcp
    balance roundrobin
    option tcp-check
    
    server ejabberd1 ejabberd1:5269 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd2 ejabberd2:5269 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd3 ejabberd3:5269 check inter 2000ms rise 2 fall 3 weight 100

# API Backend
backend ejabberd_api
    mode http
    balance roundrobin
    option httpchk GET /api/status
    
    server ejabberd1 ejabberd1:5280 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd2 ejabberd2:5280 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd3 ejabberd3:5280 check inter 2000ms rise 2 fall 3 weight 100

# File Upload Backend
backend ejabberd_upload
    mode http
    balance roundrobin
    option httpchk GET /upload
    
    # Larger timeouts for file uploads
    timeout server 300s
    timeout connect 10s
    
    server ejabberd1 ejabberd1:5280 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd2 ejabberd2:5280 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd3 ejabberd3:5280 check inter 2000ms rise 2 fall 3 weight 100

# Admin Backend (Restricted Access)
backend ejabberd_admin
    mode http
    balance roundrobin
    option httpchk GET /admin
    
    # IP whitelist for admin access
    acl admin_ips src 127.0.0.1 10.0.0.0/8 192.168.0.0/16
    http-request deny unless admin_ips
    
    server ejabberd1 ejabberd1:5280 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd2 ejabberd2:5280 check inter 2000ms rise 2 fall 3 weight 100
    server ejabberd3 ejabberd3:5280 check inter 2000ms rise 2 fall 3 weight 100

#########################
### MONITORING ##########
#########################

# Health check endpoint
frontend health_check
    bind *:8080
    mode http
    monitor-uri /health
    
    # Return 200 OK for health checks
    http-request return status 200 content-type text/plain string "OK" if { path /health }

# Rate limiting (optional)
stick-table type ip size 100k expire 30s store http_req_rate(10s),http_err_rate(10s)

# DDoS protection
frontend ddos_protection
    bind *:8081
    mode http
    
    # Track request rates
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny if { sc_http_req_rate(0) gt 20 }  # Max 20 req/10s per IP