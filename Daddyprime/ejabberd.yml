# Ejabberd Configuration for High-Load Messaging Platform
# Optimized for 10K+ concurrent users

#####################
### GENERAL CONFIG ###
#####################

hosts:
  - "daddy.local"
  - "chat.daddy.com"  # Your production domain

loglevel: warning
log_rotate_size: 10485760
log_rotate_count: 5

# Certificate configuration
certfiles:
  - "/home/ejabberd/conf/certs/daddy.pem"

# Database configuration (PostgreSQL for scalability)
sql_type: pgsql
sql_server: "postgres"
sql_database: "ejabberd"
sql_username: "ejabberd"
sql_password: "ejabberd_db_password"
sql_port: 5432
sql_pool_size: 50
sql_keepalive_interval: 60

# Default database for modules
default_db: sql
new_sql_schema: true

#####################
### CLUSTERING ####
#####################

# Cluster configuration for horizontal scaling
cluster_nodes:
  - "ejabberd@ejabberd1.daddy.local"
  - "ejabberd@ejabberd2.daddy.local"
  - "ejabberd@ejabberd3.daddy.local"

# Redis for shared session storage
redis_server: "redis"
redis_port: 6379
redis_db: 0
redis_password: ""

#####################
### PERFORMANCE ####
#####################

# Connection limits and performance tuning
max_fsm_queue: 10000
shaper_rules:
  max_user_sessions: 10
  max_user_offline_messages: 5000

shaper:
  normal: 1000
  fast: 50000
  max_stanza_size: 262144

# Rate limiting
access_rules:
  local:
    - allow: local
  c2s:
    - deny: blocked
    - allow: all
  announce:
    - allow: admin
  configure:
    - allow: admin
  muc_create:
    - allow: local
  pubsub_createnode:
    - allow: local
  trusted_network:
    - allow:
        - ip: "127.0.0.0/8"
        - ip: "::1/128"
        - ip: "::FFFF:127.0.0.1/128"

# Connection throttling
registration_timeout: 600

#####################
### LISTENERS ######
#####################

listen:
  # Client connections (XMPP over TCP)
  - port: 5222
    ip: "::"
    module: ejabberd_c2s
    max_stanza_size: 262144
    shaper: c2s_shaper
    access: c2s
    starttls_required: false
    protocol_options:
      - "compress"
    
  # WebSocket connections (for web clients)
  - port: 5443
    ip: "::"
    module: ejabberd_http
    tls: true
    protocol_options:
      - "compress"
    request_handlers:
      "/ws": ejabberd_http_ws
      "/api": mod_http_api
      "/upload": mod_http_upload
    
  # Server-to-server connections
  - port: 5269
    ip: "::"
    module: ejabberd_s2s_in
    max_stanza_size: 524288
    
  # HTTP Admin interface
  - port: 5280
    ip: "::"
    module: ejabberd_http
    request_handlers:
      "/admin": ejabberd_web_admin
      "/api": mod_http_api
      "/captcha": ejabberd_captcha
      "/upload": mod_http_upload
      "/ws": ejabberd_http_ws

#####################
### MODULES ########
#####################

modules:
  # Roster management
  mod_roster:
    db_type: sql
    versioning: true
    store_current_id: true
    
  # Presence and sessions
  mod_presence:
    db_type: sql
    
  # Private storage
  mod_private:
    db_type: sql
    
  # Message routing and delivery
  mod_message:
    db_type: sql
    
  # Offline message storage
  mod_offline:
    db_type: sql
    access_max_user_messages: max_user_offline_messages
    store_empty_body: unless_chat_state
    
  # Message Archive Management (MAM) for message history
  mod_mam:
    db_type: sql
    default: always
    compress_xml: true
    archive_chat_markers: true
    
  # Multi-User Chat (MUC) for group messaging
  mod_muc:
    db_type: sql
    access:
      - allow
    access_admin:
      - allow: admin
    access_create: muc_create
    access_persistent: muc_create
    default_room_options:
      persistent: true
      public_list: false
      
  # MUC Admin for group management
  mod_muc_admin: {}
  
  # Push notifications
  mod_push:
    db_type: sql
    include_sender: true
    include_body: "Hello from Daddy!"
    
  # File upload support
  mod_http_upload:
    put_url: "https://upload.daddy.com/@HOST@"
    get_url: "https://upload.daddy.com/@HOST@"
    file_quota: 104857600  # 100MB per user
    max_size: 52428800     # 50MB per file
    
  # Statistics and monitoring
  mod_stats: {}
  
  # Admin interface
  mod_configure: {}
  
  # Registration management
  mod_register:
    access: register
    captcha_protected: false
    password_strength: 32
    welcome_message:
      subject: "Welcome to Daddy!"
      body: "Welcome to Daddy messaging platform!"
      
  # Privacy lists
  mod_privacy:
    db_type: sql
    
  # Blocking command (XEP-0191)
  mod_blocking:
    db_type: sql
    
  # Stream management for connection reliability
  mod_stream_mgmt:
    resend_on_timeout: if_offline
    
  # Client state indication
  mod_client_state:
    queue_chat_states: true
    queue_pep: false
    
  # Carbons for multi-device sync
  mod_carbons: {}
  
  # Message delivery receipts
  mod_receipts: {}
  
  # Ping for connection keepalive
  mod_ping:
    send_pings: true
    ping_interval: 60
    timeout_action: kill
    
  # Version information
  mod_version:
    show_os: false
    
  # Time synchronization
  mod_time: {}
  
  # Service discovery
  mod_disco: {}
  
  # Capabilities advertisement
  mod_caps:
    db_type: sql
    
  # vCard support for user profiles
  mod_vcard:
    db_type: sql
    
  # Last activity tracking
  mod_last:
    db_type: sql

#####################
### AUTHENTICATION ##
#####################

# Authentication methods
auth_method:
  - sql
  - http  # For Supabase integration

# HTTP authentication for Supabase integration
auth_opts:
  http:
    host: "your-supabase-project.supabase.co"
    connection_pool_size: 10
    connection_opts:
      - {timeout, 30000}
    path_prefix: "/auth/v1/"
    method: "post"

#####################
### SECURITY #######
#####################

# Security settings
s2s_use_starttls: optional
s2s_certfile: "/home/ejabberd/conf/certs/daddy.pem"
c2s_certfile: "/home/ejabberd/conf/certs/daddy.pem"

# CAPTCHA (optional)
captcha_cmd: "/home/ejabberd/lib/ejabberd/priv/bin/captcha.sh"
captcha_url: "https://chat.daddy.com:5443/captcha"

#####################
### API ACCESS #####
#####################

# API permissions for integration
api_permissions:
  "admin access":
    from:
      - ejabberd_ctl
      - mod_http_api
    who: all
    what: "*"
  "public commands":
    who:
      - ip: "127.0.0.1/8"
    what:
      - status
      - connected_users_number

#####################
### HOOKS ##########
#####################

# Custom hooks for Supabase integration
hooks:
  user_send_packet:
    - module: mod_supabase_sync
      function: sync_message_to_supabase
  user_receive_packet:
    - module: mod_supabase_sync  
      function: update_delivery_status
  remove_user:
    - module: mod_supabase_sync
      function: cleanup_user_data