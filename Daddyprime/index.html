<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#3390ec" />
    <meta name="description" content="Daddy - AI-powered social messaging app for Nigerian users. Real-time chat with smart features." />
    <meta name="keywords" content="messaging, chat, Nigeria, real-time, AI, social, communication, Daddy app" />
    <meta name="author" content="Daddy" />
    <link rel="canonical" href="https://daddy-liart.vercel.app/" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icon-128x128.png" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://daddy-liart.vercel.app/" />
    <meta property="og:title" content="Daddy - Real-time Messaging" />
    <meta property="og:description" content="AI-powered social messaging app for Nigerian users. Real-time chat with smart features." />
    <meta property="og:image" content="https://daddy-liart.vercel.app/icon-512x512.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://daddy-liart.vercel.app/" />
    <meta property="twitter:title" content="Daddy - Real-time Messaging" />
    <meta property="twitter:description" content="AI-powered social messaging app for Nigerian users. Real-time chat with smart features." />
    <meta property="twitter:image" content="https://daddy-liart.vercel.app/icon-512x512.png" />

    <title>Daddy - Real-time Messaging</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 512 512' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M190 140 L 380 260 L 120 380 L 200 270 Z' fill='%23B8D935' stroke='%23B8D935' stroke-width='40' stroke-linejoin='round' stroke-linecap='round' /%3E%3C/svg%3E" />
  </head>
  <body class="bg-nexus-slate dark:bg-nexus-dark text-slate-900 dark:text-slate-100 transition-colors duration-200 h-full overflow-hidden fixed w-full select-none">
    <div id="root" class="h-full w-full"></div>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
              
              // Listen for updates
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New version available
                    if (confirm('New version available! Reload to update?')) {
                      window.location.reload();
                    }
                  }
                });
              });
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
        
        // Listen for messages from service worker
        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data.type === 'SYNC_COMPLETE') {
            console.log(`Synced ${event.data.syncedCount} offline messages`);
            // You could show a toast notification here
          }
        });
      }
    </script>
    
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
