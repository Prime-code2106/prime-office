# Ejabberd Cluster Configuration for High Load
version: '3.8'

services:
  # Load Balancer (HAProxy)
  haproxy:
    image: haproxy:2.8
    ports:
      - "80:80"
      - "443:443"
      - "5222:5222"   # XMPP Client
      - "5269:5269"   # XMPP Server
      - "5443:5443"   # XMPP over WebSocket
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - ejabberd1
      - ejabberd2
      - ejabberd3
    networks:
      - ejabberd_network

  # Ejabberd Node 1 (Primary)
  ejabberd1:
    image: ejabberd/ecs:latest
    hostname: ejabberd1.daddy.local
    environment:
      - EJABBERD_ADMIN=admin@daddy.local
      - EJABBERD_PASSWORD=secure_admin_password
      - ERLANG_COOKIE=daddy_cluster_cookie_2024
      - EJABBERD_NODE=ejabberd@ejabberd1.daddy.local
    volumes:
      - ./ejabberd.yml:/home/ejabberd/conf/ejabberd.yml
      - ./certs:/home/ejabberd/conf/certs
      - ejabberd1_data:/home/ejabberd/database
    ports:
      - "5222:5222"
      - "5269:5269"
      - "5443:5443"
      - "5280:5280"   # HTTP Admin
    networks:
      - ejabberd_network
    depends_on:
      - postgres
      - redis

  # Ejabberd Node 2 (Replica)
  ejabberd2:
    image: ejabberd/ecs:latest
    hostname: ejabberd2.daddy.local
    environment:
      - EJABBERD_ADMIN=admin@daddy.local
      - EJABBERD_PASSWORD=secure_admin_password
      - ERLANG_COOKIE=daddy_cluster_cookie_2024
      - EJABBERD_NODE=ejabberd@ejabberd2.daddy.local
      - EJABBERD_JOIN_CLUSTER=ejabberd@ejabberd1.daddy.local
    volumes:
      - ./ejabberd.yml:/home/ejabberd/conf/ejabberd.yml
      - ./certs:/home/ejabberd/conf/certs
      - ejabberd2_data:/home/ejabberd/database
    ports:
      - "5223:5222"
      - "5270:5269"
      - "5444:5443"
      - "5281:5280"
    networks:
      - ejabberd_network
    depends_on:
      - ejabberd1
      - postgres
      - redis

  # Ejabberd Node 3 (Replica)
  ejabberd3:
    image: ejabberd/ecs:latest
    hostname: ejabberd3.daddy.local
    environment:
      - EJABBERD_ADMIN=admin@daddy.local
      - EJABBERD_PASSWORD=secure_admin_password
      - ERLANG_COOKIE=daddy_cluster_cookie_2024
      - EJABBERD_NODE=ejabberd@ejabberd3.daddy.local
      - EJABBERD_JOIN_CLUSTER=ejabberd@ejabberd1.daddy.local
    volumes:
      - ./ejabberd.yml:/home/ejabberd/conf/ejabberd.yml
      - ./certs:/home/ejabberd/conf/certs
      - ejabberd3_data:/home/ejabberd/database
    ports:
      - "5224:5222"
      - "5271:5269"
      - "5445:5443"
      - "5282:5280"
    networks:
      - ejabberd_network
    depends_on:
      - ejabberd1
      - postgres
      - redis

  # PostgreSQL for Ejabberd (separate from Supabase)
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=ejabberd
      - POSTGRES_USER=ejabberd
      - POSTGRES_PASSWORD=ejabberd_db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - ejabberd_network

  # Redis for Session Management & Caching
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ejabberd_network

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - ejabberd_network

  # Grafana for Monitoring Dashboard
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - ejabberd_network

volumes:
  ejabberd1_data:
  ejabberd2_data:
  ejabberd3_data:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  ejabberd_network:
    driver: bridge