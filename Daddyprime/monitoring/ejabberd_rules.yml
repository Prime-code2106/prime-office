# Prometheus Alerting Rules for Ejabberd
groups:
  - name: ejabberd_alerts
    rules:
      # High connection count
      - alert: EjabberdHighConnections
        expr: ejabberd_c2s_connections > 8000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High number of XMPP connections"
          description: "Ejabberd has {{ $value }} active connections (threshold: 8000)"

      # Node down
      - alert: EjabberdNodeDown
        expr: up{job="ejabberd"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Ejabberd node is down"
          description: "Ejabberd node {{ $labels.instance }} has been down for more than 1 minute"

      # High memory usage
      - alert: EjabberdHighMemory
        expr: (ejabberd_memory_usage / ejabberd_memory_limit) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on Ejabberd"
          description: "Memory usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      # Message queue backup
      - alert: EjabberdMessageQueueHigh
        expr: ejabberd_message_queue_length > 1000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High message queue length"
          description: "Message queue length is {{ $value }} on {{ $labels.instance }}"

      # Database connection issues
      - alert: EjabberdDatabaseConnections
        expr: ejabberd_database_connections_active / ejabberd_database_connections_max > 0.9
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "{{ $value | humanizePercentage }} of database connections are in use"

  - name: haproxy_alerts
    rules:
      # Backend server down
      - alert: HAProxyBackendDown
        expr: haproxy_backend_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "HAProxy backend server is down"
          description: "Backend server {{ $labels.backend }}/{{ $labels.server }} is down"

      # High response time
      - alert: HAProxyHighResponseTime
        expr: haproxy_backend_response_time_average_seconds > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "Average response time is {{ $value }}s for backend {{ $labels.backend }}"

      # High error rate
      - alert: HAProxyHighErrorRate
        expr: rate(haproxy_backend_http_responses_total{code=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for backend {{ $labels.backend }}"

  - name: system_alerts
    rules:
      # High CPU usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      # High memory usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"

      # Disk space low
      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Disk usage is {{ $value | humanizePercentage }} on {{ $labels.instance }}"