# Prometheus Configuration for Ejabberd Monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "ejabberd_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # HAProxy metrics
  - job_name: 'haproxy'
    static_configs:
      - targets: ['haproxy:8404']
    metrics_path: /stats/prometheus

  # Ejabberd nodes
  - job_name: 'ejabberd'
    static_configs:
      - targets: 
        - 'ejabberd1:5280'
        - 'ejabberd2:5280'
        - 'ejabberd3:5280'
    metrics_path: /api/prometheus
    params:
      format: ['prometheus']

  # PostgreSQL metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']

  # Node exporter for system metrics
  - job_name: 'node'
    static_configs:
      - targets: 
        - 'ejabberd1:9100'
        - 'ejabberd2:9100'
        - 'ejabberd3:9100'

  # Custom application metrics
  - job_name: 'daddy-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: /metrics